name: taqyid
description: "Taqyid - A premium Hadeeth study app powered by HadeethEnc."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Local Storage
  hive_flutter: ^1.1.0

  # UI Utilities
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  # fonts:
  #   - family: Scheherazade
  #     fonts:
  #       - asset: assets/fonts/Scheherazade-Regular.ttf
  #       - asset: assets/fonts/Scheherazade-Bold.ttf
  #         weight: 700

  assets:
    - assets/fonts/
    - assets/images/
